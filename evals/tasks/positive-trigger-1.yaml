id: positive-trigger-001
name: Deprecation warning on kubernetes_config_map
description: Upgrade prompt with a deprecation warning that should activate the skill.
tags:
  - positive-trigger
inputs:
  prompt: >-
    I'm upgrading the hashicorp/kubernetes provider to 3.0 and terraform plan now
    warns that kubernetes_config_map is deprecated and I should use the versioned
    resource. How do I migrate without destroying state?
expected:
  should_trigger: true
graders:
  - type: trigger
    name: should-activate
    config:
      skill_path: SKILL.md
      mode: positive
      threshold: 0.6
