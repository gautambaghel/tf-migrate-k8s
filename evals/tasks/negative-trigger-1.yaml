id: negative-trigger-001
name: Authoring a brand-new Kubernetes resource
description: Writing a new resource is out of scope and should not activate the skill.
tags:
  - negative-trigger
inputs:
  prompt: >-
    Write a new kubernetes_deployment resource in Terraform for my web app with
    three replicas and a service in front of it.
expected:
  should_trigger: false
graders:
  - type: trigger
    name: should-not-activate
    config:
      skill_path: SKILL.md
      mode: negative
      threshold: 0.6
